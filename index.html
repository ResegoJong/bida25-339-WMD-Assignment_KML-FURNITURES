<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KML FURNITURE | Modern Furniture</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }

        /* Top Accent Bar */
        .top-bar {
            height: 15px;
            background-color: #8fa17d; /* Sage green from your image */
            width: 100%;
        }

        /* Header & Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: #fff;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 40px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
            color: #000;
        }

        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            font-size: 16px;
            transition: 0.3s;
        }

        /* The Green "Home" Button */
        nav ul li .active {
            background-color: #8fa17d;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
        }

        nav ul li a:hover:not(.active) {
            color: #8fa17d;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 550px;
            background-image: linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.05)), 
                              url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
        }

        /* Product Card Container (Overlapping Hero) */
        .product-container {
            position: absolute;
            bottom: -80px; /* Pulls cards down to overlap the bottom of hero */
            width: 85%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            color: #444;
        }

        /* Spacer to push footer down because of absolute positioning */
        .content-spacer {
            height: 150px;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: #f9f9f9;
            color: #777;
            font-size: 14px;
        }

        /* Responsive for mobile */
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
                position: static;
                margin: 20px auto;
            }
            .hero { height: 300px; }
            header { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <header>
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8fa17d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 11l7-7 7 7M5 19h14"/></svg>
            <h1>KML FURNITURES</h1></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="offers.html">Offers</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="product-container">
                <div class="card">
                    <h3>Wooden chair</h3>
                    <img src="https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?auto=format&fit=crop&q=80&w=800" alt="Norden Armchair">
                    <p>Suitable side table or studying chair</p>
                </div>
                <div class="card">
                    <h3>KITCHEN UNIT</h3>
                    <img src="https://images.unsplash.com/photo-1577145900570-7c056348633c?auto=format&fit=crop&q=80&w=800" alt="Fjord Dining Table">
                    <p>Safely stores your utensils</p></p>
                </div>
                <div class="card">
                    <h3>Book shelf</h3>
                    <img src="https://images.unsplash.com/photo-1594620302200-9a762244a156?auto=format&fit=crop&q=80&w=800" alt="Alva Bookshelf">
                    <p>Suitable for at home library</p>
                </div>
            </div>
        </section>
        
        <div class="content-spacer"></div>
    </main>

    <footer>
        &copy; 2026 KML FURNITURES | Fine Handcrafted Furniture | BOTSWANA
    </footer>

</body>
</html>
