<!DOCTYPE html>
<html>
<head>
    <title>KML Furniture</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Nav Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .links a {
            margin-left: 25px;
            text-decoration: none;
            color: #333;
        }

        /* Main Section */
        .main-hero {
            background-image: url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=1500');
            background-size: cover;
            background-position: center;
            height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
            flex-grow: 1; /* Pushes footer to bottom if content is short */
        }

        .main-hero h1 {
            font-size: 50px;
            margin: 0;
            font-family: serif;
        }

        .main-hero p {
            font-size: 20px;
            margin: 15px 0 30px 0;
        }

        .shop-btn {
            background-color: #a4b48b;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            width: fit-content;
            border-radius: 5px;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            padding: 40px 50px;
            text-align: center;
        }

        .footer-links a {
            color: #bbb;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }

        .footer-links a:hover {
            color: white;
        }

        .copyright {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">KML FURNITURE</div>
        <div class="links">
            <a href="#">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="main-hero">
        <h1>Modern & Stylish<br>Furniture</h1>
        <p>Elevate Your Home Comfort</p>
        <a href="offers.html" class="shop-btn">Offers</a>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="contact.html">Support</a>
        </div>
        <div class="copyright">
            &copy; 2026 KML Furniture. All rights reserved.
        </div>
    </footer>

</body>
</html>
