<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Collection | KML Furniture</title>
    <style>
        /* Shared Styles from Index */
        body { margin: 0; font-family: sans-serif; color: #333; background-color: #f9f8f4; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: white; }
        .logo { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        .links a { margin-left: 25px; text-decoration: none; color: #333; }
        .active { text-decoration: underline !important; font-weight: bold; }

        /* Products Page Specifics */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        
        h2 { font-family: serif; font-size: 32px; text-transform: uppercase; margin-bottom: 40px; }

        /* The Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Product Card */
        .product-card {
            background: white;
            border: 8px solid #a4b48b; /* The signature sage border */
            text-align: center;
            padding-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #eee;
        }

        .product-info { padding: 20px; }
        
        .product-info h3 { 
            font-size: 18px; 
            margin: 10px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .price { 
            font-size: 16px; 
            color: #666; 
            margin-bottom: 20px; 
            display: block;
        }

        /* Add to Cart Button */
        .add-btn {
            background-color: #a4b48b;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            display: inline-block;
            transition: opacity 0.2s;
        }

        .add-btn:hover { opacity: 0.8; }

        footer { background-color: #333; color: white; padding: 20px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">KML FURNITURE</div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="#" class="active">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="container">
        <h2>Our Collection</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=500" alt="Dining Set" class="product-image">
                <div class="product-info">
                    <h3>Dining Set</h3>
                    <span class="price">P1,299.00</span>
                    <a href="#" class="add-btn">ADD TO CART</a>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1592078615290-033ee584e277?auto=format&fit=crop&w=500" alt="Lounge Chair" class="product-image">
                <div class="product-info">
                    <h3>Lounge Chair</h3>
                    <span class="price">P450.00</span>
                    <a href="#" class="add-btn">ADD TO CART</a>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=500" alt="Media Console" class="product-image">
                <div class="product-info">
                    <h3>Television Stand</h3>
                    <span class="price">P890.00</span>
                    <a href="#" class="add-btn">ADD TO CART</a>
                </div>
            </div>
            
            </div>
    </div>

    <footer>
        &copy; 2026 KML Furniture. All rights reserved.
    </footer>

</body>
</html>
