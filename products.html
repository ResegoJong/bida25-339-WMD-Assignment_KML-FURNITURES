<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Collection | KML Furniture</title>
    <style>
        /* Base Styles */
        body { 
            margin: 0; 
            font-family: sans-serif; 
            color: #333; 
            background-color: #fdfdfb; 
        }

        /* Nav Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .logo { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        
        .links a { 
            margin-left: 15px; 
            text-decoration: none; 
            color: #333; 
            font-size: 13px; 
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-family: serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* --- THE RESPONSIVE GRID (Table Look) --- */
        .product-table {
            display: grid;
            /* Default: 3 columns for Laptop */
            grid-template-columns: repeat(3, 1fr); 
            border-top: 1px solid #a4b48b;
            border-left: 1px solid #a4b48b;
        }

        /* Tablet View */
        @media (max-width: 992px) {
            .product-table {
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        /* Phone View */
        @media (max-width: 600px) {
            .product-table {
                grid-template-columns: 1fr; 
            }
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }

        /* Table Cells */
        .product-cell {
            border-right: 1px solid #a4b48b;
            border-bottom: 1px solid #a4b48b;
            padding: 40px 20px;
            text-align: center;
            background-color: white;
            transition: background-color 0.3s;
        }

        .product-cell:hover {
            background-color: #f9f9f7;
        }

        .product-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            margin-bottom: 25px;
        }

        .product-title {
            font-family: serif;
            font-size: 16px;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            display: block;
            color: #777;
            margin-bottom: 20px;
            font-size: 15px;
            font-weight: bold;
        }

        /* Minimal Text Link */
        .add-link {
            color: #a4b48b;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #a4b48b;
            padding-bottom: 2px;
            transition: all 0.2s;
        }

        .add-link:hover {
            color: #333;
            border-bottom-color: #333;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">KML FURNITURE</div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="#" style="font-weight: bold;">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="container">
        <h2>Our Collection</h2>
        
        <div class="product-table">
            <div class="product-cell">
                <img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=500" class="product-image">
                <div class="product-title">Dining Set</div>
                <span class="price">P1,299.00</span>
                <a href="#" class="add-link">Add to Cart</a>
            </div>

            <div class="product-cell">
                <img src="https://images.unsplash.com/photo-1592078615290-033ee584e277?auto=format&fit=crop&w=500" class="product-image">
                <div class="product-title">Lounge Chair</div>
                <span class="price">P450.00</span>
                <a href="#" class="add-link">Add to Cart</a>
            </div>

            <div class="product-cell">
                <img src="https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=500" class="product-image">
                <div class="product-title">Television Stand</div>
                <span class="price">P890.00</span>
                <a href="#" class="add-link">Add to Cart</a>
            </div>

            <div class="product-cell">
                <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=500" class="product-image">
                <div class="product-title">Décor Vase</div>
                <span class="price">P75.00</span>
                <a href="#" class="add-link">Add to Cart</a>
            </div>

            <div class="product-cell">
                <img src="https://images.unsplash.com/photo-1584144141200-81cb45ef42d2?auto=format&fit=crop&w=500" class="product-image">
                <div class="product-title">Pillow Set</div>
                <span class="price">P120.00</span>
                <a href="#" class="add-link">Add to Cart</a>
            </div>

            <div class="product-cell">
                <img src="https://images.unsplash.com/photo-1567016432779-094069958ad5?auto=format&fit=crop&w=500" class="product-image">
                <div class="product-title">Coffee Table</div>
                <span class="price">P680.00</span>
                <a href="#" class="add-link">Add to Cart</a>
            </div>
        </div>
    </div>

    <footer>
        <div style="font-size: 12px; color: #888;">&copy; 2026 KML Furniture. All rights reserved.</div>
    </footer>

</body>
</html>
