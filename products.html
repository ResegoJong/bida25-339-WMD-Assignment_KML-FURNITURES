<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Collection | KML Furniture</title>
    <style>
        /* Base Styles */
        body { 
            margin: 0; 
            font-family: sans-serif; 
            color: #333; 
            background-color: #fdfdfb; 
        }

        /* Nav Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .logo { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        
        .links a { 
            margin-left: 15px; 
            text-decoration: none; 
            color: #333; 
            font-size: 13px; 
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-family: serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* --- THE RESPONSIVE GRID (Table Look) --- */
        .product-table {
            display: grid;
            /* Default: 3 columns for Laptop */
            grid-template-columns: repeat(3, 1fr); 
            border-top: 1px solid #a4b48b;
            border-left: 1px solid #a4b48b;
        }

        /* Tablet View */
        @media (max-width: 992px) {
            .product-table {
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        /* Phone View */
        @media (max-width: 600px) {
            .product-table {
                grid-template-columns: 1fr; 
            }
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }

        /* Table Cells */
        .product-cell {
            border-right: 1px solid #a4b48b;
            border-bottom: 1px solid #a4b48b;
            padding: 40px 20px;
            text-align: center;
            background-color: white;
            transition: background-color 0.3s;
        }

        .product-cell:hover {
            background-color: #f9f9f7;
        }

        .product-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            margin-bottom: 25px;
        }

        .product-title {
            font-family: serif;
            font-size: 16px;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            display: block;
            color: #777;
            margin-bottom: 20px;
            font-size: 15px;
            font-weight: bold;
        }

        /* Minimal Text Link */
        .add-link {
            color: #a4b48b;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #a4b48b;
            padding-bottom: 2px;
            transition: all 0.2s;
        }

        .add-link:hover {
            color: #333;
            border-bottom-color: #333;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
